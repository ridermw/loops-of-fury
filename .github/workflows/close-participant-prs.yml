name: Close participant PRs

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  close:
    if: github.repository == 'ridermw/loops-of-fury'
    runs-on: ubuntu-latest
    steps:
      - name: Close PR with workshop guidance
        uses: actions/github-script@v7
        with:
          script: |
            const body = `Thanks for joining the workshop. This upstream repo is instructor-controlled and does not accept workshop PRs. Please continue the lab in your own fork instead:

            \`\`\`powershell
            gh repo fork ridermw/loops-of-fury --clone=true
            cd loops-of-fury
            \`\`\`

            This PR is being closed automatically so the upstream repo stays clean.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
